function weightForBF(bf) { return LEAN_MASS / (1 - bf / 100); }

function usePersist(key, initial) {
  const [val, setVal] = useState(() => {
    try { const r = localStorage.getItem(key); return r != null ? JSON.parse(r) : initial; }
    catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
  return [val, setVal];
}

function useCountUp(target, dur, deps) {
  const [v, setV] = useState(0);
  useEffect(() => {
    let raf, start;
    const to = Number(target) || 0;
    const step = (t) => {
      if (!start) start = t;
      const p = Math.min(1, (t - start) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setV(to * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, deps);
  return v;
}

function Confetti({ go }) {
  const [bits, setBits] = useState([]);
  useEffect(() => {
    if (!go) return;
    const colors = ["#E3B43A", "#F4D77A", "#9c7c1f", "#f5f3ec"];
    setBits(Array.from({ length: 50 }, (_, i) => ({
      id: i + Math.random(), left: Math.random() * 100, dur: 1.6 + Math.random() * 1.4,
      delay: Math.random() * .3, color: colors[i % colors.length], rot: Math.random() * 360,
    })));
    const t = setTimeout(() => setBits([]), 3200);
    return () => clearTimeout(t);
  }, [go]);
  if (!bits.length) return null;
  return (
    <div className="confetti">
      {bits.map(b => (
        <i key={b.id} style={{ left: `${b.left}%`, background: b.color, animationDuration: `${b.dur}s`,
          animationDelay: `${b.delay}s`, transform: `rotate(${b.rot}deg)` }} />
      ))}
    </div>
  );
}

function Protocolo10() {
  const [tab, setTab] = useState("entrenos");
  const [openDay, setOpenDay] = useState(null);
  const [toast, setToast] = useState("");
  const [confetti, setConfetti] = useState(0);
  const [workoutLogs, setWorkoutLogs] = usePersist("p10_workouts", {});
  const [weightLogs, setWeightLogs] = usePersist("p10_weights", [{ date: "2026-05-12", weight: 67.2 }]);
  const [dietState, setDietState] = usePersist("p10_diet", {});
  const [trainDays, setTrainDays] = usePersist("p10_trainDays", {});

  const t = (m) => { setToast(m); setTimeout(() => setToast(""), 1700); };
  const fireConfetti = () => setConfetti(c => c + 1);

  const activeDays = useMemo(() => {
    const s = new Set();
    Object.values(workoutLogs).forEach(a => a.forEach(l => s.add(l.date)));
    weightLogs.forEach(l => s.add(l.date));
    Object.keys(dietState).forEach(d => { const x = dietState[d]; if (x && ((x.extra && x.extra.length) || Object.keys(x.checked || {}).length)) s.add(d); });
    Object.keys(trainDays).forEach(d => s.add(d));
    return s;
  }, [workoutLogs, weightLogs, dietState, trainDays]);

  const currentStreak = useMemo(() => {
    let n = 0, d = new Date();
    while (activeDays.has(d.toISOString().slice(0, 10))) { n++; d.setDate(d.getDate() - 1); }
    return n;
  }, [activeDays]);

  return (
    <div className="p10">
      <Styles />
      <Confetti go={confetti} />
      <header className="hd">
        <div className="logo disp">PROTOCOLO<span className="ten"><span>10</span></span></div>
        <div className={`streak ${currentStreak > 0 ? "lit" : ""}`}><Icon name="fire" /> {currentStreak} {currentStreak === 1 ? "DÍA" : "DÍAS"}</div>
      </header>
      <div className="ct" key={tab + (openDay || "")}>
        {tab === "entrenos" && !openDay && <EntrenosList onOpen={setOpenDay} logs={workoutLogs} />}
        {tab === "entrenos" && openDay && (
          <DayDetail day={ROUTINE.find(d => d.id === openDay)} logs={workoutLogs} onBack={() => setOpenDay(null)}
            onSave={(exName, entry, dayId, isPR) => {
              setWorkoutLogs(p => ({ ...p, [exName]: [entry, ...(p[exName] || [])] }));
              setTrainDays(p => ({ ...p, [entry.date]: dayId }));
              if (isPR) { t("Nuevo récord"); fireConfetti(); } else t("Serie guardada");
            }} />
        )}
        {tab === "progreso" && <Progreso weightLogs={weightLogs} workoutLogs={workoutLogs}
          onAdd={(e) => { setWeightLogs(p => [e, ...p]); t("Peso registrado"); }} />}
        {tab === "dieta" && <Dieta state={dietState} setState={setDietState} onToast={t} onComplete={fireConfetti} />}
        {tab === "calendario" && <Calendario activeDays={activeDays} trainDays={trainDays} weightLogs={weightLogs} dietState={dietState} streak={currentStreak} />}
      </div>
      {toast && <div className="toast">{toast}</div>}
      <nav className="tabs">
        {[
          { k: "entrenos", l: "Entrenos", i: "dumbbell" },
          { k: "progreso", l: "Progreso", i: "target" },
          { k: "dieta", l: "Dieta", i: "plate" },
          { k: "calendario", l: "Racha", i: "cal" },
        ].map(x => (
          <button key={x.k} className={`tab ${tab === x.k ? "on" : ""}`} onClick={() => { setTab(x.k); setOpenDay(null); }}>
            <Icon name={x.i} /> {x.l}
          </button>
        ))}
      </nav>
    </div>
  );
}

function ExerciseCard({ ex, history, onSave }) {
  const [sets, setSets] = useState(() => Array.from({ length: ex.sets }, () => ({ w: "", r: "" })));
  const prev = history[0];
  const best1RM = useMemo(() => {
    let b = 0;
    history.forEach(h => h.sets.forEach(s => { const e = epley(s.w, s.r); if (e > b) b = e; }));
    return b;
  }, [history]);
  const isPRcard = history.length > 0 && history[0].isPR;
  const upd = (i, f, v) => setSets(s => s.map((r, idx) => idx === i ? { ...r, [f]: v } : r));
  const save = () => {
    const filled = sets.filter(s => s.w !== "" || s.r !== "");
    if (!filled.length) return;
    const clean = filled.map(s => ({ w: Number(s.w) || 0, r: Number(s.r) || 0 }));
    const new1RM = Math.max(...clean.map(s => epley(s.w, s.r)));
    const isPR = best1RM > 0 && new1RM > best1RM + 0.01;
    onSave({ date: todayISO(), sets: clean, isPR }, isPR);
    setSets(Array.from({ length: ex.sets }, () => ({ w: "", r: "" })));
  };
  return (
    <div className={`ex ${isPRcard ? "pr" : ""}`}>
      <div className="exh">
        <span className="exn">{ex.name}</span>
        <div className="exbadges">
          {ex.main && <span className="exm">MAIN</span>}
          {isPRcard && <span className="prbadge"><Icon name="crown" /> PR</span>}
        </div>
      </div>
      {prev
        ? <div className="prev">Última · <b>{prev.sets.map(s => `${s.w}×${s.r}`).join(" · ")}</b>{best1RM > 0 && <span className="est">≈ {best1RM.toFixed(0)}kg 1RM</span>}</div>
        : <div className="prev">Primera vez — marca el listón</div>}
      <div className="collbl"><span></span><span>KG</span><span>REPS</span></div>
      {sets.map((s, i) => (
        <div className="setrow" key={i}>
          <span className="setn">{i + 1}</span>
          <input className={`inp ${s.w ? "filled" : ""}`} type="number" inputMode="decimal" placeholder="–" value={s.w} onChange={e => upd(i, "w", e.target.value)} />
          <input className={`inp ${s.r ? "filled" : ""}`} type="number" inputMode="numeric" placeholder="–" value={s.r} onChange={e => upd(i, "r", e.target.value)} />
        </div>
      ))}
      <button className="btn sm" style={{ marginTop: 8 }} onClick={save}>Guardar</button>
    </div>
  );
}

  const current = sorted[0] ? sorted[0].weight : null;

  const goalWeight = weightForBF(USER.goalBF);
  const kgToGoal = current != null ? Math.max(0, current - goalWeight) : null;
  const animBF = useCountUp(bfNow || 0, 1100, [bfNow]);
  const prog = bfNow != null ? Math.min(100, Math.max(0, ((USER.refBF - bfNow) / (USER.refBF - USER.goalBF)) * 100)) : 0;
  const ascAll = [...weightLogs].sort((a, b) => a.date.localeCompare(b.date));
  const sparkAsc = ascAll.slice(-14).map(l => l.weight);

  let weeksLeft = null;
  if (sparkAsc.length >= 2 && current != null && kgToGoal > 0) {
    const rate = (sparkAsc[0] - sparkAsc[sparkAsc.length - 1]) / (sparkAsc.length - 1);
    const weekly = rate > 0.05 ? rate : 0.45;
    weeksLeft = Math.ceil(kgToGoal / weekly);
  }
  const daysToDate = Math.round((new Date(USER.goalDate) - new Date(todayISO())) / 86400000);
  const R = 84, C = 2 * Math.PI * R;

  return (

                  </linearGradient>
                </defs>
                <circle cx="94" cy="94" r={R} fill="none" stroke="url(#rg)" strokeWidth="11" strokeLinecap="round"
                  strokeDasharray={`${dash} ${C}`} style={{ transition: "stroke-dasharray 1s cubic-bezier(.22,1,.36,1)", filter: "drop-shadow(0 0 6px rgba(227,180,58,.5))" }} />
              </svg>
              <div className="ringtxt">
                <div className="ringnum disp">{animBF.toFixed(1)}<small>%</small></div>
                <div className="ringlbl">grasa est.</div>
              </div>
            </div>
            <div className="ringgoal">{kgToGoal <= 0 ? "OBJETIVO ALCANZADO" : `faltan ${kgToGoal.toFixed(1)} kg para el 10%`}</div>
          </div>
          <div className="goalticks" style={{ marginTop: 14 }}><span>{USER.refBF}% inicio</span><span style={{ color: "var(--gold)" }}>meta {USER.goalBF}%</span></div>
          <div className="goalbar"><div style={{ width: `${prog}%` }} /></div>
          <div className="stat" style={{ marginTop: 16 }}>
            <div className="statb"><div className="statn disp">{current}<small>kg</small></div><div className="statl">Peso hoy</div></div>
            <div className="statb"><div className="statn disp">{goalWeight.toFixed(1)}<small>kg</small></div><div className="statl">Peso meta</div></div>
            <div className="statb"><div className="statn disp">{totalPRs}</div><div className="statl">Récords</div></div>
          </div>
          {kgToGoal > 0 && (
            <div className="proj">
              {weeksLeft != null && <><div className="projbig disp">~{weeksLeft} {weeksLeft === 1 ? "SEMANA" : "SEMANAS"}</div><div className="projlbl">a tu ritmo actual</div></>}
              {daysToDate > 0 && <div className="projlbl" style={{ marginTop: 8 }}>faltan <b style={{ color: "var(--gold)" }}>{daysToDate} días</b> para el 9 jun</div>}
            </div>
          )}
          {sparkAsc.length > 1 && (
            <div className="spark">
              {sparkAsc.map((v, i) => <div key={i} className={i === sparkAsc.length - 1 ? "hot" : ""} style={{ height: `${max === min ? 50 : 14 + ((v - min) / (max - min)) * 86}%` }} />)}
            </div>
          )}
        </div>
      )}
      <div className="card">
        <div className="field" style={{ marginBottom: 0 }}>
          <label>Peso de hoy · en ayunas</label>
          <input className="inp" type="number" inputMode="decimal" placeholder="ej. 67.0" value={w} onChange={e => setW(e.target.value)} />
        </div>
        <button className="btn" style={{ marginTop: 13 }} onClick={add}>Registrar peso</button>
      </div>
      {sorted.length > 0 && (
        <div className="card">
          {sorted.slice(0, 12).map((l, i) => {
            const next = sorted[i + 1];
            const d = next ? l.weight - next.weight : null;
            return (
              <div className="logl" key={i}>
                <span className="logd">{fmtDate(l.date)} · {estimateBF(l.weight).toFixed(1)}% est.</span>
                <span className="logv disp">{l.weight}<small>kg</small>
                  {d != null && d !== 0 && <span className={`delta ${d < 0 ? "dn" : "up"}`}>{d < 0 ? "▼" : "▲"}{Math.abs(d).toFixed(1)}</span>}
                </span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Dieta({ state, setState, onToast, onComplete }) {
  const today = todayISO();
  const day = state[today] || { checked: {}, extra: [] };
  const [exTxt, setExTxt] = useState("");
  const [exKcal, setExKcal] = useState("");
  const wasComplete = useRef(false);
  const allItems = DIET.flatMap(m => m.items);
  const eatenPlan = allItems.filter(it => day.checked[it.id]).reduce((s, it) => s + it.kcal, 0);
  const extraKcal = (day.extra || []).reduce((s, e) => s + e.kcal, 0);
  const totalEaten = eatenPlan + extraKcal;
  const overGoal = totalEaten - USER.kcalGoal;
  const pct = Math.min(100, (totalEaten / USER.kcalGoal) * 100);
  const checkedCount = Object.keys(day.checked).length;
  const allChecked = checkedCount === allItems.length;
  const animKcal = useCountUp(totalEaten, 600, [totalEaten]);
  useEffect(() => {
    if (allChecked && !wasComplete.current) { wasComplete.current = true; onComplete(); onToast("Dieta completada"); }
    if (!allChecked) wasComplete.current = false;
  }, [allChecked]);
  const toggle = (id) => setState(p => {
    const d = p[today] || { checked: {}, extra: [] };
    const checked = { ...d.checked }; if (checked[id]) delete checked[id]; else checked[id] = true;
    return { ...p, [today]: { ...d, checked } };
  });
  const addExtra = () => {
    if (!exTxt || !exKcal) return;
    setState(p => { const d = p[today] || { checked: {}, extra: [] }; return { ...p, [today]: { ...d, extra: [...(d.extra || []), { txt: exTxt, kcal: Number(exKcal) }] } }; });
    setExTxt(""); setExKcal(""); onToast("Extra añadido");
  };
  const removeExtra = (idx) => setState(p => { const d = p[today]; return { ...p, [today]: { ...d, extra: d.extra.filter((_, i) => i !== idx) } }; });
  return (
    <div className="stagger">
      <div>
        <p className="kicker">Dieta del día · plan 10%</p>
        <h1 className="h1">Hoy <em>comes</em></h1>
        <p className="sub">Marca lo que ya has comido</p>
      </div>
      <div className="card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 11 }}>
          <span className="disp" style={{ fontSize: 38, color: "var(--gold)" }}>
            {Math.round(animKcal)}<span style={{ fontSize: 15, color: "var(--txt-dim)", fontFamily: "Archivo Narrow", fontWeight: 600 }}> / {USER.kcalGoal} kcal</span>
          </span>
          <span className="narrow" style={{ fontWeight: 700, fontSize: 13, color: overGoal > 0 ? "var(--red)" : "var(--green)" }}>
            {overGoal <= 0 ? `${-overGoal} libres` : `+${overGoal}`}
          </span>
        </div>
        <div className="goalbar"><div style={{ width: `${pct}%`, background: overGoal > 0 ? "var(--red)" : undefined }} /></div>
        <div className="narrow" style={{ fontSize: 11.5, color: "var(--txt-dim)", marginTop: 8 }}>{checkedCount}/{allItems.length} alimentos {extraKcal > 0 && `· +${extraKcal} extra`}</div>
      </div>
      {DIET.map((m) => {
        const eaten = m.items.filter(it => day.checked[it.id]).reduce((s, it) => s + it.kcal, 0);
        return (
          <div className="card mealcard" key={m.meal}>
            <div className="mealh">
              <div className="lt"><span className="mealt disp">{m.meal}</span><span className="mealtime">{m.time}</span></div>
              <span className="mealk">{eaten}/{m.kcal} kcal</span>
            </div>
            <div className="mealbody">
              {m.items.map(it => (
                <div className={`chk ${day.checked[it.id] ? "done" : ""}`} key={it.id} onClick={() => toggle(it.id)}>
                  <span className="box"><Icon name="check" /></span>
                  <span className="chktxt">{it.txt}</span>
                  <span className="chkk">{it.kcal}</span>
                </div>
              ))}
            </div>
          </div>
        );
      })}
      <div className="card">
        <p className="kicker" style={{ margin: "0 0 12px" }}>¿Te has pasado?</p>
        {(day.extra || []).map((e, i) => (
          <div className="chk done" key={i} onClick={() => removeExtra(i)}>
            <span className="chktxt" style={{ textDecoration: "none", color: "var(--txt)" }}>{e.txt}</span>
            <span className="chkk" style={{ color: "var(--red)" }}>+{e.kcal} · quitar</span>
          </div>
        ))}
        <div className="extra" style={{ marginTop: 6 }}>
          <input className="inp" placeholder="ej. Onza chocolate" value={exTxt} onChange={e => setExTxt(e.target.value)} />
          <input className="inp mini" type="number" inputMode="numeric" placeholder="kcal" value={exKcal} onChange={e => setExKcal(e.target.value)} />
        </div>
        <button className="btn sm" style={{ marginTop: 10 }} onClick={addExtra}>Añadir extra</button>
      </div>
    </div>
  );
}

function Calendario({ activeDays, trainDays, weightLogs, dietState, streak }) {
  const [ref, setRef] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DOW = ["L","M","X","J","V","S","D"];
  const todayStr = todayISO();
  const first = new Date(ref.y, ref.m, 1);
  const startDow = (first.getDay() + 6) % 7;
  const daysInMonth = new Date(ref.y, ref.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  const iso = (d) => `${ref.y}-${String(ref.m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
  const monthPrefix = `${ref.y}-${String(ref.m + 1).padStart(2, "0")}`;
  const trainCount = Object.keys(trainDays).filter(k => k.startsWith(monthPrefix)).length;
  return (
    <div className="stagger">
      <div>
        <p className="kicker">Constancia</p>
        <h1 className="h1">Tu <em>racha</em></h1>
        <p className="sub">La disciplina se ve aquí</p>
      </div>
      <div className="stat">
        <div className="statb"><div className="statn disp">{streak}</div><div className="statl">Racha actual</div></div>
        <div className="statb"><div className="statn disp">{activeDays.size}</div><div className="statl">Días activos</div></div>
        <div className="statb"><div className="statn disp">{trainCount}</div><div className="statl">Entrenos mes</div></div>
      </div>
      <div className="card">
        <div className="calhd">
          <button className="calnav" onClick={() => setRef(r => { const m = r.m - 1; return m < 0 ? { y: r.y - 1, m: 11 } : { ...r, m }; })}>‹</button>
          <span className="calmonth disp">{MONTHS[ref.m]} {ref.y}</span>
          <button className="calnav" onClick={() => setRef(r => { const m = r.m + 1; return m > 11 ? { y: r.y + 1, m: 0 } : { ...r, m }; })}>›</button>
        </div>
        <div className="calgrid">
          {DOW.map(d => <div className="caldow" key={d}>{d}</div>)}
          {cells.map((d, i) => {
            if (d == null) return <div className="calcell empty" key={i} />;
            const k = iso(d);
            const isTrain = !!trainDays[k];
            const isToday = k === todayStr;
            const hasW = weightLogs.some(l => l.date === k);
            const x = dietState[k]; const hasD = x && (Object.keys(x.checked || {}).length || (x.extra || []).length);
            return (
              <div className={`calcell ${isTrain ? "train" : ""} ${isToday ? "today" : ""}`} key={i}>
                <span className="cd">{d}</span>
                <div className="caldot">
                  {hasW && <i style={{ background: "var(--blue)" }} />}
                  {hasD && <i style={{ background: "var(--green)" }} />}
                </div>
              </div>
            );
          })}
        </div>
        <div className="legend">
          <span><i style={{ background: "var(--gold)" }} /> Entreno</span>
          <span><i style={{ background: "var(--blue)" }} /> Pesaje</span>
          <span><i style={{ background: "var(--green)" }} /> Dieta</span>
        </div>
      </div>
      {activeDays.size === 0 && <div className="card empty"><Icon name="cal" /><div>Registra un entreno, peso o comida para empezar tu racha.</div></div>}
    </div>
  );
}
