// Estimación de % grasa a partir del peso, usando masa magra fija (LEAN_MASS).
// En el corte final la pérdida de peso es casi toda grasa, así que la masa
// magra se mantiene ~constante y el % grasa = (peso - magra) / peso.
function estimateBF(weight) {
  const fat = Math.max(0, weight - LEAN_MASS);
  return (fat / weight) * 100;
}
function weightForBF(bf) {
  // peso al que el % grasa sería 'bf', manteniendo la masa magra fija.
  // bf = (w - lean)/w*100  →  w = lean / (1 - bf/100)
  return LEAN_MASS / (1 - bf / 100);
}

// ---------- PERSISTENCIA EN localStorage ----------
function usePersist(key, initial) {
  const [val, setVal] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw != null ? JSON.parse(raw) : initial;
    } catch { return initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
  }, [key, val]);
  return [val, setVal];
}

    plate: <><path {...p} d="M4 3v7a2 2 0 0 0 2 2v9M6 3v7M8 3v7M16 3c-1.5 0-2 4-2 6s1 2 2 2v9"/></>,
    cal: <><rect {...p} x="3" y="4.5" width="18" height="16" rx="2"/><path {...p} d="M3 9h18M8 2.5v4M16 2.5v4"/></>,
    scale: <path {...p} d="M12 3v3M5 9h14l-2.5 7.5a5 5 0 0 1-9 0L5 9zM8 9l4-3 4 3"/>,
    fire: <path {...p} d="M12 3s4 3.5 4 8a4 4 0 0 1-8 0c0-1.5.5-2.5 1-3 0 1 .5 1.5 1 1.5C9 7 12 3 12 3z"/>,
    chevron: <path {...p} d="M15 18l-6-6 6-6"/>,
    check: <path {...p} d="M5 12l5 5L19 7"/>,
  };
  return <svg viewBox="0 0 24 24">{paths[name]}</svg>;
};

// ============================================================
//  APP
// ============================================================
function Protocolo10() {
  const [tab, setTab] = useState("entrenos");
  const [openDay, setOpenDay] = useState(null);
  const [toast, setToast] = useState("");

  const [workoutLogs, setWorkoutLogs] = usePersist("p10_workouts", {});       // {exName:[{date,sets}]}
  const [weightLogs, setWeightLogs] = usePersist("p10_weights", [{ date: "2026-05-12", weight: 67.2 }]);
  const [dietState, setDietState] = usePersist("p10_diet", {});               // {date:{checked, extra}}
  const [trainDays, setTrainDays] = usePersist("p10_trainDays", {});          // {date:dayId}

  const t = (m) => { setToast(m); setTimeout(() => setToast(""), 1500); };

  const activeDays = useMemo(() => {
    const s = new Set();
    Object.values(workoutLogs).forEach(a => a.forEach(l => s.add(l.date)));
    weightLogs.forEach(l => s.add(l.date));
    Object.keys(dietState).forEach(d => { if ((dietState[d].extra?.length || Object.keys(dietState[d].checked||{}).length)) s.add(d); });
    Object.keys(trainDays).forEach(d => s.add(d));
    return s;
  }, [workoutLogs, weightLogs, dietState, trainDays]);

  return (
    <div className="p10">
      <Styles />
      <header className="hd">
        <div className="logo">PROTOCOLO <b>10</b></div>
        <div className="streak"><Icon name="fire" /> <b>{activeDays.size}</b> días activos</div>
      </header>

      <div className="ct" key={tab + (openDay || "")}>
        {tab === "entrenos" && !openDay && <EntrenosList onOpen={setOpenDay} logs={workoutLogs} />}
        {tab === "entrenos" && openDay && (
          <DayDetail day={ROUTINE.find(d => d.id === openDay)} logs={workoutLogs} onBack={() => setOpenDay(null)}
            onSave={(exName, entry, dayId) => {
              setWorkoutLogs(p => ({ ...p, [exName]: [entry, ...(p[exName] || [])] }));
              setTrainDays(p => ({ ...p, [entry.date]: dayId }));
              t("Serie guardada 💪");
            }} />
        )}
        {tab === "progreso" && <Progreso weightLogs={weightLogs} onAdd={(e) => { setWeightLogs(p => [e, ...p]); t("Peso registrado ✓"); }} />}
        {tab === "dieta" && <Dieta state={dietState} setState={setDietState} onToast={t} />}
        {tab === "calendario" && <Calendario activeDays={activeDays} trainDays={trainDays} weightLogs={weightLogs} dietState={dietState} />}
      </div>

      {toast && <div className="toast">{toast}</div>}

      <nav className="tabs">
        {[
          { k: "entrenos", l: "Entrenos", i: "dumbbell" },
          { k: "progreso", l: "Progreso", i: "target" },
          { k: "dieta", l: "Dieta", i: "plate" },
          { k: "calendario", l: "Calendario", i: "cal" },
        ].map(x => (
          <button key={x.k} className={`tab ${tab === x.k ? "on" : ""}`} onClick={() => { setTab(x.k); setOpenDay(null); }}>
            <Icon name={x.i} /> {x.l}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ---------- ENTRENOS ----------
function EntrenosList({ onOpen, logs }) {
  const lastFor = (day) => {
    let latest = null;
    day.exercises.forEach(ex => (logs[ex.name] || []).forEach(l => { if (!latest || l.date > latest) latest = l.date; }));
    return latest;
  };
  return (
    <>
      <p className="sect">Rutina · 6 días · 3 series</p>
      <h1 className="h1">Elige tu día</h1>
      <p className="sub">Doble frecuencia · Hipertrofia & Fuerza</p>
      {ROUTINE.map(day => {
        const last = lastFor(day);
        return (
          <div key={day.id} className="daycard" onClick={() => onOpen(day.id)}>
            <span className="pill">{day.tag}</span>
            <h2 className="dayname">{day.name}</h2>
            <div className="chips">{day.groups.map(g => <span key={g} className="chip">{g}</span>)}</div>
            <div className="daymeta">
              <span className="last">{last ? <>Último: <b>{fmtDate(last)}</b></> : "Sin registros aún"}</span>
              <span style={{ width: 18, color: "var(--txt-dim)" }}><Icon name="chevron" /></span>
            </div>
          </div>
        );
      })}
    </>
  );
}

function DayDetail({ day, logs, onBack, onSave }) {
  return (
    <>
      <button className="back" onClick={onBack}><Icon name="chevron" /> Volver</button>
      <span className="pill">{day.tag}</span>
      <h1 className="h1" style={{ fontSize: 23, marginBottom: 18 }}>{day.name}</h1>
      {day.exercises.map((ex, i) => (
        <ExerciseCard key={i} ex={ex} history={logs[ex.name] || []} onSave={(entry) => onSave(ex.name, entry, day.id)} />
      ))}
    </>
  );
}

function ExerciseCard({ ex, history, onSave }) {
  const [sets, setSets] = useState(() => Array.from({ length: ex.sets }, () => ({ w: "", r: "" })));
  const prev = history[0];
  const upd = (i, f, v) => setSets(s => s.map((r, idx) => idx === i ? { ...r, [f]: v } : r));
  const save = () => {
    const filled = sets.filter(s => s.w !== "" || s.r !== "");
    if (!filled.length) return;
    onSave({ date: todayISO(), sets: filled.map(s => ({ w: Number(s.w) || 0, r: Number(s.r) || 0 })) });
    setSets(Array.from({ length: ex.sets }, () => ({ w: "", r: "" })));
  };
  return (
    <div className="ex">
      <div className="exh"><span className="exn">{ex.name}</span>{ex.main && <span className="exm">MAIN LIFT</span>}</div>
      {prev && <div className="prev">Anterior ({fmtDate(prev.date)}): <b>{prev.sets.map(s => `${s.w}kg×${s.r}`).join("  ·  ")}</b></div>}
      <div className="collbl"><span></span><span>Peso (kg)</span><span>Reps</span></div>
      {sets.map((s, i) => (
        <div className="setrow" key={i}>
          <span className="setn">{i + 1}</span>
          <input className="inp" type="number" inputMode="decimal" placeholder="–" value={s.w} onChange={e => upd(i, "w", e.target.value)} />
          <input className="inp" type="number" inputMode="numeric" placeholder="–" value={s.r} onChange={e => upd(i, "r", e.target.value)} />
        </div>
      ))}
      <button className="btn" style={{ marginTop: 8, padding: 10, fontSize: 13 }} onClick={save}>Guardar registro</button>
    </div>
  );
}

// ---------- PROGRESO HACIA EL 10% ----------
function Progreso({ weightLogs, onAdd }) {
  const [w, setW] = useState("");
  const add = () => { if (!w) return; onAdd({ date: todayISO(), weight: Number(w) }); setW(""); };

  const sorted = [...weightLogs].sort((a, b) => b.date.localeCompare(a.date));
  const current = sorted[0]?.weight ?? null;
  const bfNow = current != null ? estimateBF(current) : null;
  const goalWeight = weightForBF(USER.goalBF);
  const kgToGoal = current != null ? Math.max(0, current - goalWeight) : null;

  // progreso en la barra: del % de referencia (recta final) al objetivo
  const prog = bfNow != null
    ? Math.min(100, Math.max(0, ((USER.refBF - bfNow) / (USER.refBF - USER.goalBF)) * 100))
    : 0;

  const sparkAsc = [...weightLogs].sort((a, b) => a.date.localeCompare(b.date)).slice(-14).map(l => l.weight);
  const min = Math.min(...sparkAsc), max = Math.max(...sparkAsc);

  // proyección: ritmo de las últimas 2 semanas
  let weeksLeft = null;
  if (sparkAsc.length >= 2 && current != null) {
    const oldest = sparkAsc[0], newest = sparkAsc[sparkAsc.length - 1];
    const totalLost = oldest - newest;
    const ratePerEntry = totalLost / (sparkAsc.length - 1);
    const weeklyRate = ratePerEntry > 0.05 ? ratePerEntry : 0.45; // fallback ~0.45kg/sem (recta final)
    if (kgToGoal > 0) weeksLeft = Math.ceil(kgToGoal / weeklyRate);
  }

  return (
    <>
      <p className="sect">Objetivo · 10% de grasa</p>
      <h1 className="h1">Tu progreso</h1>
      <p className="sub">{USER.height}cm · meta {USER.goalBF}% para el 9 jun</p>

      {current == null ? (
        <div className="card" style={{ textAlign: "center" }}>
          <Icon name="target" />
          <p style={{ color: "var(--txt-dim)", fontSize: 13, marginTop: 8 }}>
            Pésate por las mañanas en ayunas. La app estima tu % de grasa y cuánto te falta para el 10%.
          </p>
        </div>
      ) : (
        <div className="card">
          <div className="ring-wrap">
            <div className="bigpct">{bfNow.toFixed(1)}<small>%</small></div>
            <div className="statl" style={{ marginTop: 4 }}>grasa estimada</div>
          </div>
          <div className="goalbar"><div style={{ width: `${prog}%` }} /></div>
          <div className="goalticks"><span>{USER.refBF}%</span><span style={{ color: "var(--gold)" }}>meta {USER.goalBF}%</span></div>

          <div className="stat" style={{ marginTop: 16 }}>
            <div className="statb"><div className="statn">{current}<small style={{ fontSize: 13 }}>kg</small></div><div className="statl">Peso actual</div></div>
            <div className="statb"><div className="statn">{kgToGoal > 0 ? kgToGoal.toFixed(1) : "0"}<small style={{ fontSize: 13 }}>kg</small></div><div className="statl">Para el 10%</div></div>
            <div className="statb"><div className="statn">{goalWeight.toFixed(1)}<small style={{ fontSize: 13 }}>kg</small></div><div className="statl">Peso meta</div></div>
          </div>

          {kgToGoal <= 0 ? (
            <p style={{ textAlign: "center", color: "var(--green)", fontSize: 13, marginTop: 14, fontWeight: 600 }}>
              🏆 ¡Has alcanzado el 10%! A mantener o lean bulk.
            </p>
          ) : (
            <div style={{ textAlign: "center", marginTop: 14 }}>
              {weeksLeft != null && (
                <p style={{ color: "var(--txt-dim)", fontSize: 12.5, margin: 0 }}>
                  A tu ritmo llegarías en <b style={{ color: "var(--gold)" }}>~{weeksLeft} {weeksLeft === 1 ? "semana" : "semanas"}</b>
                </p>
              )}
              {(() => {
                const days = Math.round((new Date(USER.goalDate) - new Date(todayISO())) / 86400000);
                if (days > 0) return <p style={{ color: "var(--txt-dim)", fontSize: 11.5, margin: "4px 0 0" }}>Meta 9 jun · faltan <b style={{ color: "var(--txt)" }}>{days} días</b></p>;
                if (days === 0) return <p style={{ color: "var(--gold)", fontSize: 11.5, margin: "4px 0 0" }}>¡Hoy es el día objetivo!</p>;
                return <p style={{ color: "var(--txt-dim)", fontSize: 11.5, margin: "4px 0 0" }}>Fecha objetivo superada · sigue puliendo</p>;
              })()}
            </div>
          )}

          {sparkAsc.length > 1 && (
            <div className="spark">
              {sparkAsc.map((v, i) => <div key={i} style={{ height: `${max === min ? 50 : 12 + ((v - min) / (max - min)) * 88}%` }} title={`${v}kg`} />)}
            </div>
          )}
        </div>
      )}

      <div className="card">
        <div className="field" style={{ marginBottom: 0 }}>
          <label>Peso de hoy (kg) · en ayunas</label>
          <input className="inp" type="number" inputMode="decimal" placeholder="ej. 70.4" value={w} onChange={e => setW(e.target.value)} />
        </div>
        <button className="btn" style={{ marginTop: 14 }} onClick={add}>Registrar peso</button>
      </div>

      {sorted.length > 0 && (
        <div className="card">
          {sorted.map((l, i) => {
            const next = sorted[i + 1];
            const d = next ? l.weight - next.weight : null;
            return (
              <div className="logl" key={i}>
                <span className="logd">{fmtDate(l.date)} · {estimateBF(l.weight).toFixed(1)}% est.</span>
                <span className="logv">{l.weight}<small> kg</small>
                  {d != null && d !== 0 && <span className={`delta ${d < 0 ? "dn" : "up"}`}>{d < 0 ? "▼" : "▲"} {Math.abs(d).toFixed(1)}</span>}
                </span>
              </div>
            );
          })}
        </div>
      )}
      <p style={{ fontSize: 11, color: "var(--txt-dim)", textAlign: "center", lineHeight: 1.5 }}>
        El % es una estimación basada en tu peso (asume que lo perdido es grasa). Para precisión real, mide pliegues con el plicómetro.
      </p>
    </>
  );
}

// ---------- DIETA (checklist diario) ----------
function Dieta({ state, setState, onToast }) {
  const today = todayISO();
  const day = state[today] || { checked: {}, extra: [] };
  const [exTxt, setExTxt] = useState("");
  const [exKcal, setExKcal] = useState("");

  const planKcal = DIET.reduce((s, m) => s + m.kcal, 0);
  const eatenPlan = DIET.flatMap(m => m.items).filter(it => day.checked[it.id]).reduce((s, it) => s + it.kcal, 0);
  const extraKcal = (day.extra || []).reduce((s, e) => s + e.kcal, 0);
  const totalEaten = eatenPlan + extraKcal;
  const overGoal = totalEaten - USER.kcalGoal;

  const toggle = (id) => {
    setState(p => {
      const d = p[today] || { checked: {}, extra: [] };
      const checked = { ...d.checked, [id]: !d.checked[id] };
      if (!checked[id]) delete checked[id];
      return { ...p, [today]: { ...d, checked } };
    });
  };
  const addExtra = () => {
    if (!exTxt || !exKcal) return;
    setState(p => {
      const d = p[today] || { checked: {}, extra: [] };
      return { ...p, [today]: { ...d, extra: [...(d.extra || []), { txt: exTxt, kcal: Number(exKcal) }] } };
    });
    setExTxt(""); setExKcal(""); onToast("Añadido ✓");
  };
  const removeExtra = (idx) => {
    setState(p => {
      const d = p[today]; const extra = d.extra.filter((_, i) => i !== idx);
      return { ...p, [today]: { ...d, extra } };
    });
  };

  const pct = Math.min(100, (totalEaten / USER.kcalGoal) * 100);

  return (
    <>
      <p className="sect">Dieta del día · plan 10%</p>
      <h1 className="h1">Hoy comes</h1>
      <p className="sub">Marca lo que ya has comido · objetivo {USER.kcalGoal} kcal</p>

      <div className="card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
          <span className="disp" style={{ fontSize: 30, fontWeight: 700 }}>
            {totalEaten}<span style={{ fontSize: 15, color: "var(--txt-dim)" }}> / {USER.kcalGoal} kcal</span>
          </span>
          <span style={{ fontSize: 13, color: overGoal > 0 ? "var(--red)" : "var(--green)" }}>
            {overGoal <= 0 ? `${-overGoal} restantes` : `+${overGoal} pasado`}
          </span>
        </div>
        <div className="goalbar" style={{ margin: "0 0 4px" }}>
          <div style={{ width: `${pct}%`, background: overGoal > 0 ? "var(--red)" : undefined }} />
        </div>
        <div style={{ fontSize: 11, color: "var(--txt-dim)" }}>Plan base: {planKcal} kcal · marcado: {eatenPlan} kcal{extraKcal > 0 && ` · extra: +${extraKcal}`}</div>
      </div>

      {DIET.map((m) => {
        const eaten = m.items.filter(it => day.checked[it.id]).reduce((s, it) => s + it.kcal, 0);
        return (
          <div className="meal card" key={m.meal}>
            <div className="mealh"><span className="mealt">{m.meal}</span><span className="mealk">{eaten}/{m.kcal} kcal</span></div>
            {m.items.map(it => (
              <div className={`chk ${day.checked[it.id] ? "done" : ""}`} key={it.id} onClick={() => toggle(it.id)}>
                <span className="box"><Icon name="check" /></span>
                <span className="chktxt">{it.txt}</span>
                <span className="chkk">{it.kcal}</span>
              </div>
            ))}
          </div>
        );
      })}

      <div className="card">
        <div className="mealh" style={{ padding: "0 2px 10px" }}><span className="mealt">¿Te has excedido?</span></div>
        <p style={{ fontSize: 12, color: "var(--txt-dim)", margin: "0 0 10px" }}>Añade lo que comiste de más para que el total cuadre.</p>
        {(day.extra || []).map((e, i) => (
          <div className="chk done" key={i} onClick={() => removeExtra(i)} style={{ cursor: "pointer" }}>
            <span className="chktxt" style={{ textDecoration: "none", color: "var(--txt)" }}>{e.txt}</span>
            <span className="chkk" style={{ color: "var(--red)" }}>+{e.kcal} ✕</span>
          </div>
        ))}
        <div className="extra">
          <input className="inp" placeholder="ej. Onza chocolate" value={exTxt} onChange={e => setExTxt(e.target.value)} />
          <input className="inp mini" type="number" inputMode="numeric" placeholder="kcal" value={exKcal} onChange={e => setExKcal(e.target.value)} style={{ maxWidth: 78 }} />
        </div>
        <button className="btn" style={{ marginTop: 10, padding: 10, fontSize: 13 }} onClick={addExtra}>Añadir extra</button>
      </div>
    </>
  );
}

// ---------- CALENDARIO ----------
function Calendario({ activeDays, trainDays, weightLogs, dietState }) {
  const [ref, setRef] = useState(() => { const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() }; });
  const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DOW = ["L","M","X","J","V","S","D"];
  const todayStr = todayISO();

  const first = new Date(ref.y, ref.m, 1);
  const startDow = (first.getDay() + 6) % 7; // lunes=0
  const daysInMonth = new Date(ref.y, ref.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const iso = (d) => `${ref.y}-${String(ref.m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;

  // racha actual (días consecutivos activos terminando hoy)
  const currentStreak = useMemo(() => {
    let n = 0; let d = new Date();
    while (activeDays.has(d.toISOString().slice(0, 10))) { n++; d.setDate(d.getDate() - 1); }
    return n;
  }, [activeDays]);

  const trainCount = Object.keys(trainDays).filter(k => k.startsWith(`${ref.y}-${String(ref.m + 1).padStart(2, "0")}`)).length;

  return (
    <>
      <p className="sect">Constancia</p>
      <h1 className="h1">Calendario</h1>
      <p className="sub">Tu racha y días de entreno</p>

      <div className="stat" style={{ marginBottom: 14 }}>
        <div className="statb"><div className="statn">{currentStreak}</div><div className="statl">racha actual</div></div>
        <div className="statb"><div className="statn">{activeDays.size}</div><div className="statl">días activos</div></div>
        <div className="statb"><div className="statn">{trainCount}</div><div className="statl">entrenos {MONTHS[ref.m].slice(0,3).toLowerCase()}.</div></div>
      </div>

      <div className="card">
        <div className="calhd">
          <button className="calnav" onClick={() => setRef(r => { const m = r.m - 1; return m < 0 ? { y: r.y - 1, m: 11 } : { ...r, m }; })}>‹</button>
          <span className="calmonth">{MONTHS[ref.m]} {ref.y}</span>
          <button className="calnav" onClick={() => setRef(r => { const m = r.m + 1; return m > 11 ? { y: r.y + 1, m: 0 } : { ...r, m }; })}>›</button>
        </div>
        <div className="calgrid">
          {DOW.map(d => <div className="caldow" key={d}>{d}</div>)}
          {cells.map((d, i) => {
            if (d == null) return <div className="calcell empty" key={i} />;
            const k = iso(d);
            const isTrain = !!trainDays[k];
            const isActive = activeDays.has(k);
            const isToday = k === todayStr;
            const hasWeight = weightLogs.some(l => l.date === k);
            const hasDiet = dietState[k] && (Object.keys(dietState[k].checked || {}).length || (dietState[k].extra || []).length);
            return (
              <div className={`calcell ${isTrain ? "train" : ""} ${isToday ? "today" : ""}`} key={i}>
                {d}
                <div className="caldot">
                  {hasWeight && <i style={{ background: "var(--blue)" }} />}
                  {hasDiet && <i style={{ background: "var(--green)" }} />}
                </div>
              </div>
            );
          })}
        </div>
        <div className="legend">
          <span><i style={{ background: "var(--gold)" }} /> Entreno</span>
          <span><i style={{ background: "var(--blue)" }} /> Pesaje</span>
          <span><i style={{ background: "var(--green)" }} /> Dieta</span>
        </div>
      </div>

      {activeDays.size === 0 && (
        <div className="empty"><Icon name="cal" /><div>Registra entrenos, peso o dieta y verás aquí tu constancia</div></div>
      )}
    </>
  );
}

root.render(React.createElement(Protocolo10));

<script>
// Service worker inline para funcionamiento offline (cachea esta misma página)
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='p10-v1';
    self.addEventListener('install', e=>{ self.skipWaiting(); });
    self.addEventListener('activate', e=>{ e.waitUntil(self.clients.claim()); });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.open(CACHE).then(c=>
          fetch(e.request).then(r=>{ c.put(e.request, r.clone()); return r; })
            .catch(()=> c.match(e.request))
        )
      );
    });
  `;
  const blob = new Blob([swCode], {type:'text/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
